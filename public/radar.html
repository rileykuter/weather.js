<!DOCTYPE html>
<html>
    <head>

<!-- Tab Details -->

        <link type="image/x-icon" href="media/favicon.ico" rel="icon">
        <title id="title">radar - weather.js</title>

<!-- JS and Stylesheets -->

        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="radar.js"></script>

    </head>

    <body class="m-0 text-[#f0f0f2] w-screen h-screen bg-linear-to-t from-[#242429] to-zinc-700">

        <div id="background" class="">

<!-- Navigation Bar -->

        <div id="navBar" class="flex ml-10 pt-5 space-x-7">

            <button id="homeBTN" class="w-20 h-20 invert hover:opacity-80 active:opacity-70"><img src="media/weathericon.png"></button>
            
            <button id="searchBTN" 
            class="invert mt-5 w-10 h-10 hover:opacity-80 active:opacity-70"><img src="media/searchico.webp"></button>

            <button id="radarBTN" 
            class="invert mt-5 w-10 h-10 hover:opacity-80 active:opacity-70"><img src="media/radar.png"></button>
            
            <div class="items-center justify-center text-center">
                <h1 class="text-7xl absolute left-1/2 transform -translate-x-1/2">
                    weather.js - radar
                </h1>
            </div>
        </div>

        <div class="flex pt-15 flex-col items-center leading-loose space-y-8">

            <div class="flex flex-row outline rounded-xl">

<!-- Embed -->

            <div class="flex">

                <iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=5&overlay=wind&product=ecmwf&level=surface&lat=35.258&lon=-81.987&message=true" 
                width="840" 
                height="480" 
                frameborder="0" 
                class="outline rounded-xl drop-shadow-xl">

                    <p>Your Browser Doesn't Support iframe</p>

                </iframe>
            </div>
        </div>
    </body>
</html>
